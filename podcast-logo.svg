<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff8c5a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" rx="60" fill="url(#bgGrad)"/>
  
  <!-- Running figure stylized -->
  <g transform="translate(200, 180)" fill="url(#orangeGrad)">
    <!-- Head -->
    <circle cx="0" cy="-70" r="25"/>
    <!-- Body curve -->
    <path d="M 0 -45 Q 30 -20 20 20 Q 10 50 -10 70" stroke="url(#orangeGrad)" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Arms -->
    <path d="M -5 -35 Q -40 -50 -50 -20" stroke="url(#orangeGrad)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M 5 -30 Q 30 -40 45 -15" stroke="url(#orangeGrad)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <path d="M -5 65 Q -30 90 -45 110" stroke="url(#orangeGrad)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M 5 60 Q 35 80 50 100" stroke="url(#orangeGrad)" stroke-width="10" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Play button overlay -->
  <circle cx="200" cy="200" r="70" fill="none" stroke="url(#orangeGrad)" stroke-width="4" opacity="0.3"/>
  
  <!-- "A" letter -->
  <text x="200" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="900" fill="url(#orangeGrad)" text-anchor="middle">A</text>
  
  <!-- Option text -->
  <text x="200" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="8" opacity="0.8">OPTION</text>
</svg>
